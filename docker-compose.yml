version: "3.9"

services:
  api:
    build: .
    container_name: llm-cost-autopilot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./models:/app/models
    depends_on:
      - grafana
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: llm-cost-autopilot-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: llm-cost-autopilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  grafana_data:
  ollama_data:
